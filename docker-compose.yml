services:
  # ── Backend (FastAPI + SQLite) ──
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - dbdata:/app/data
    ports:
      - "8000:8000"

  # ── Frontend (Next.js) ──
  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # ── Nginx (reverse proxy) ──
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  dbdata:
  pgdata:
